name: E2E with Claude failure triage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E and sandboxed Claude repair
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://aitesters.byst.re' }}
    outputs:
      repair_ready: ${{ steps.bundle.outputs.repair_ready || 'false' }}

    steps:
      - name: Check out tests
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test repair policy
        env:
          PYTHONPATH: automation
        run: python3 -m unittest discover -s automation/tests -v

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:e2e 2>&1 | tee test-output.log

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-evidence-${{ github.run_attempt }}
          path: |
            test-output.log
            test-results/
            playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Clone diagnostic source repositories
        if: >-
          steps.e2e.outcome == 'failure' &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/clone-triage-sources.sh

      - name: Install Claude Code CLI
        id: claude_install
        if: >-
          steps.e2e.outcome == 'failure' &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
        env:
          PYTHONPATH: automation
        shell: bash
        run: |
          version="$(python3 -c 'from self_healing.config import CLAUDE_CODE_VERSION; print(CLAUDE_CODE_VERSION)')"
          npm install --global "@anthropic-ai/claude-code@$version"

      - name: Triage and repair the E2E failure with Claude Code
        id: triage
        if: steps.claude_install.outcome == 'success'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: automation
        run: >-
          python3 -m self_healing.claude_cli
          --result triage-result.json
          --metadata claude-run.json
          --progress claude-progress.jsonl

      - name: Publish Claude diagnosis summary
        if: always() && steps.claude_install.outcome == 'success'
        env:
          PYTHONPATH: automation
        run: >-
          python3 -m self_healing.report
          --result triage-result.json
          --metadata claude-run.json
          --github-summary "$GITHUB_STEP_SUMMARY"
          --repository "${{ github.repository }}"
          --run-id "${{ github.run_id }}"
          --server-url "${{ github.server_url }}"

      - name: Bundle repair candidate
        id: bundle
        if: steps.triage.outcome == 'success'
        env:
          PYTHONPATH: automation
        run: >-
          python3 -m self_healing.bundle
          --result triage-result.json
          --patch repair.patch
          --repository "${{ github.repository }}"
          --github-output "$GITHUB_OUTPUT"

      - name: Upload Claude triage and repair candidate
        if: always() && steps.claude_install.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: claude-triage-${{ github.run_attempt }}
          path: |
            triage-result.json
            claude-run.json
            claude-progress.jsonl
            repair.patch
          if-no-files-found: warn
          retention-days: 14

      - name: Preserve the E2E failure
        if: steps.e2e.outcome == 'failure'
        run: exit 1

  publish-repair:
    name: Validate and publish Claude repair
    needs: e2e
    if: >-
      always() &&
      needs.e2e.outputs.repair_ready == 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
      pull-requests: write
    env:
      APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://aitesters.byst.re' }}

    steps:
      - name: Check out trusted repair policy
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}
          path: policy
          persist-credentials: false

      - name: Check out PR candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          path: candidate
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: candidate/package-lock.json

      - name: Install candidate dependencies
        working-directory: candidate
        run: npm ci

      - name: Install candidate Chromium
        working-directory: candidate
        run: npx playwright install --with-deps chromium

      - name: Download repair candidate
        uses: actions/download-artifact@v8
        with:
          name: claude-triage-${{ github.run_attempt }}
          path: repair-output

      - name: Validate and commit repair
        env:
          PYTHONPATH: policy/automation
        run: >-
          python3 -m self_healing.publish
          --result repair-output/triage-result.json
          --patch repair-output/repair.patch
          --repository "${{ github.repository }}"
          --repo-dir candidate

      - name: Deliver only through a PR branch
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
          PYTHONPATH: policy/automation
        run: >-
          python3 -m self_healing.deliver
          --event "${{ github.event_name }}"
          --repository "${{ github.repository }}"
          --repo-dir candidate
          --head-branch "$HEAD_BRANCH"
          --run-id "${{ github.run_id }}"
          --result repair-output/triage-result.json
          --metadata repair-output/claude-run.json
          --server-url "${{ github.server_url }}"
